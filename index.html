<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juhee Lee Blog</title>
    <style>
        /* 폰트: 우아한 세리프체와 깔끔한 산세리프체 조합 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;700&family=Pretendard:wght@300;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            overflow-x: hidden;
        }

        /* --- 1. Spline 배경 설정 (하단 링크 가리기) --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .background-container iframe {
            position: absolute;
            top: -50px; /* 위쪽 여백 조정 */
            left: 0;
            width: 100%;
            height: calc(100% + 120px); /* 실제보다 길게 만들어 하단 로고를 화면 밖으로 밀어냄 */
            border: none;
        }

        /* --- 2. 상단 네비게이션 (검색, 로고, 목차) --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px;
            z-index: 100;
        }

        .header-left .search-icon {
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }
        .header-left .search-icon:hover { opacity: 1; }

        .header-center .small-logo {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-style: italic;
            text-decoration: none;
            color: #333;
        }

        .header-right .menu-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .header-right .menu-icon:hover { opacity: 1; }

        /* --- 3. 중앙 메인 섹션 --- */
        .main-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 8rem; /* 이미지처럼 아주 크게 */
            font-weight: 700;
            letter-spacing: -3px;
            color: #2c2c2c;
            margin-bottom: 20px;
            user-select: none;
        }

        /* --- 4. 하단 카테고리 메뉴 --- */
        .category-nav {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }

        .category-nav a {
            font-family: 'Pretendard', sans-serif;
            text-decoration: none;
            color: #555;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 5px 10px;
            transition: all 0.4s ease;
            position: relative;
        }

        /* 마우스 호버/드래그 느낌의 효과 */
        .category-nav a:hover {
            color: #997a5d; /* 고전적인 브라운 톤 */
            background-color: rgba(153, 122, 93, 0.1);
            transform: translateY(-3px);
        }

        /* 스크롤 안내 표시 */
        .scroll-text {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #999;
            text-transform: uppercase;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .main-title { font-size: 4rem; }
            .category-nav { gap: 15px; flex-direction: column; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <iframe src='https://my.spline.design/glassbuttonsinspiredbyreijopalmiste-Nlb6vC2i8D4mp1oQBWbNwDTM/' frameborder='0'></iframe>
    </div>

    <header>
        <div class="header-left">
            <span class="search-icon" title="검색">🔍</span>
        </div>
        <div class="header-center">
            <a href="#" class="small-logo">juheelee blog</a>
        </div>
        <div class="header-right">
            <a href="#index" class="menu-icon">
                <span>INDEX</span>
                <span style="font-size: 1.2rem;">≡</span>
            </a>
        </div>
    </header>

    <main class="main-hero">
        <h1 class="main-title">Juhee Lee</h1>
        
        <nav class="category-nav">
            <a href="#marketing">Marketing</a>
            <a href="#art">Art & Culture</a>
            <a href="#travel">Travel</a>
        </nav>

        <div class="scroll-text">Scroll</div>
    </main>

    <section id="marketing" style="height: 100vh; padding: 100px;">
        <h2>Marketing Log</h2>
        </section>

</body>
</html>
