<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juhee Lee Blog</title>
    <style>
        /* 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;700&family=Pretendard:wght@100;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff; /* 기본 배경은 화이트 */
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* --- 1. 상단 네비게이션 (검색, 메뉴) --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
            z-index: 1000;
            mix-blend-mode: difference; /* 배경색에 따라 글자색이 반전되어 항상 보입니다 */
            color: white; 
        }

        .header-left .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        /* 돋보기 아이콘: Juhee Lee 글자와 동일한 미니멀한 선 형태 */
        .search-svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .header-right .menu-btn {
            font-size: 1.8rem;
            text-decoration: none;
            color: currentColor;
            line-height: 1;
        }

        /* --- 2. Hero 섹션 (3D 배경 + 타이틀) --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 90vh; /* 화면의 90%만 3D 영역으로 사용 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .spline-container {
            position: absolute;
            top: -60px; /* 로고 가리기 위해 상단 이동 */
            left: 0;
            width: 100%;
            height: calc(100% + 120px); /* 하단 링크 가리기 위해 길게 설정 */
            z-index: 1;
        }

        .spline-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hero-title {
            position: relative;
            z-index: 10;
            font-family: 'Noto Serif KR', serif;
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: #1a1a1a;
            text-align: center;
            pointer-events: none; /* 텍스트 뒤의 3D를 만질 수 있게 함 */
        }

        /* --- 3. 카테고리 네비게이션 (화이트 영역 시작점) --- */
        .category-bar {
            position: sticky;
            top: 0;
            width: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 30px 0;
            z-index: 900;
            border-bottom: 1px solid #f0f0f0;
        }

        .category-bar a {
            text-decoration: none;
            color: #888;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        /* 마우스 커서 가져다 대면 색상 변경 */
        .category-bar a:hover {
            color: #1a1a1a;
            font-weight: 600;
        }

        /* --- 4. 콘텐츠 영역 --- */
        .content-section {
            min-height: 100vh;
            padding: 100px 10%;
            background: #ffffff;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .hero-title { font-size: 3rem; }
            .category-bar { gap: 20px; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="search-btn">
                <svg class="search-svg" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
        <div class="header-right">
            <a href="#" class="menu-btn">≡</a>
        </div>
    </header>

    <section class="hero-section">
        <div class="spline-container">
            <iframe src='https://my.spline.design/glassbuttonsinspiredbyreijopalmiste-Nlb6vC2i8D4mp1oQBWbNwDTM/' frameborder='0'></iframe>
        </div>
        <h1 class="hero-title">Juhee Lee Blog</h1>
    </section>

    <nav class="category-bar">
        <a href="#marketing">MARKETING</a>
        <a href="#art">ART&CULTURE</a>
        <a href="#travel">TRAVEL</a>
    </nav>

    <section id="marketing" class="content-section">
        <h2 style="font-family: 'Noto Serif KR', serif; font-size: 2.5rem; margin-bottom: 40px;">Marketing</h2>
        <p>여기에 마케팅 관련 포트폴리오와 인사이트를 채워보세요.</p>
    </section>

    <section id="art" class="content-section" style="background-color: #fafafa;">
        <h2 style="font-family: 'Noto Serif KR', serif; font-size: 2.5rem; margin-bottom: 40px;">Art & Culture</h2>
        <p>서양 미술과 문화에 대한 주희님만의 깊이 있는 해석을 적는 공간입니다.</p>
    </section>

    
</body>
</html>
