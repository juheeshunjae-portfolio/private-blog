<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juheelee blog | Creative Marketer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@400;600&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            line-height: 1.8;
            color: #222;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f7;
        }

        /* 3D Hero 섹션 */
        .hero-3d {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -2px;
        }

        nav { margin-top: 20px; }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: #fff;
            padding: 30px;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .category {
            font-size: 0.75rem;
            color: #997a5d;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

<div class="hero-3d">
    <iframe src='https://my.spline.design/glassbuttonsinspiredbyreijopalmiste-Nlb6vC2i8D4mp1oQBWbNwDTM/' 
            frameborder='0' width='100%' height='100%'></iframe>
</div>

<header>
    <h1>juheelee blog</h1>
    <p style="font-family: 'Noto Serif KR', serif; italic; color: #777;">마케팅, 예술, 그리고 입체적인 기록들</p>
    <nav>
        <a href="#">Portfolio</a>
        <a href="#">Art & Culture</a>
        <a href="#">Travel</a>
    </nav>
</header>

<div class="grid">
    <div class="card">
        <span class="category">Art & Culture</span>
        <h3>서양 미술사에서 찾은 '공간 마케팅'의 기원</h3>
        <p>18세기 살롱 문화가 어떻게 현대의 커뮤니티 공간으로 진화했을까요?</p>
    </div>
    <div class="card" style="background: #222; color: #fff;">
        <span class="category" style="color: #997a5d;">Marketing Insight</span>
        <h3>3D 인터랙티브 요소가 체류시간에 미치는 영향</h3>
        <p>방금 위에서 만져보신 버튼들, 재미있으셨나요? 이것이 브랜딩의 시작입니다.</p>
    </div>
</div>

</body>
</html>
